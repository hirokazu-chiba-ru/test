<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.5s;
        }
        body.login-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        body.success-bg { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }

        .card {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* ログイン画面 */
        #loginView h1 { font-size: 28px; font-weight: 700; color: #333; margin-bottom: 8px; }
        #loginView p.sub { color: #888; font-size: 14px; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 14px; font-weight: 600; color: #555; margin-bottom: 6px; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 12px 16px;
            border: 2px solid #e0e0e0; border-radius: 8px;
            font-size: 15px; outline: none; transition: border-color 0.3s;
        }
        input:focus { border-color: #667eea; }
        .btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s; margin-top: 8px;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.6; cursor: default; }
        .error {
            background: #fff0f0; border: 1px solid #ffcccc; color: #cc0000;
            padding: 10px 14px; border-radius: 8px; font-size: 14px;
            margin-bottom: 20px; display: none;
        }
        .demo-info {
            margin-top: 24px; padding: 14px; background: #f8f9ff;
            border-radius: 8px; font-size: 13px; color: #666; text-align: left;
        }
        .demo-info p { margin-bottom: 4px; }
        .demo-info strong { color: #667eea; }

        /* 成功画面 */
        #successView { display: none; }
        #successView .checkmark { font-size: 72px; margin-bottom: 16px; animation: pop 0.5s ease-out; }
        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        #successView h1 { font-size: 32px; font-weight: 700; color: #2d8a4e; margin-bottom: 12px; }
        #successView p { font-size: 16px; color: #555; margin-bottom: 32px; line-height: 1.6; }
        #successView .username { color: #27ae60; font-weight: 700; }
        .btn-logout {
            display: inline-block; padding: 12px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
        }
        .btn-logout:hover { opacity: 0.9; }
    </style>
</head>
<body class="login-bg">
    <div class="card">
        <!-- ログイン画面 -->
        <div id="loginView">
            <h1>ログイン</h1>
            <p class="sub">アカウント情報を入力してください</p>
            <div class="error" id="errorMsg">ユーザー名またはパスワードが正しくありません。</div>
            <div class="form-group">
                <label for="uid">ユーザー名</label>
                <input type="text" id="uid" placeholder="ユーザー名を入力" autofocus>
            </div>
            <div class="form-group">
                <label for="pwd">パスワード</label>
                <input type="password" id="pwd" placeholder="パスワードを入力">
            </div>
            <button class="btn" id="loginBtn" onclick="doLogin()">ログイン</button>
            <div class="demo-info">
                <p><strong>デモ用アカウント：</strong></p>
                <p>ユーザー名: <strong>admin</strong> / パスワード: <strong>password123</strong></p>
                <p>ユーザー名: <strong>user</strong> / パスワード: <strong>pass</strong></p>
            </div>
        </div>

        <!-- 成功画面 -->
        <div id="successView">
            <div class="checkmark">✅</div>
            <h1>ログインが成功しました</h1>
            <p>ようこそ、<span class="username" id="welcomeName"></span> さん！<br>正常にログインされました。</p>
            <button class="btn-logout" onclick="doLogout()">ログアウト</button>
        </div>
    </div>

    <script>
        const PREFIX = "{{ prefix }}";

        async function doLogin() {
            const uid = document.getElementById('uid').value.trim();
            const pwd = document.getElementById('pwd').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');

            if (!uid || !pwd) return;

            btn.disabled = true;
            btn.textContent = '認証中...';
            err.style.display = 'none';

            try {
                const res = await fetch(PREFIX + '/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ u: uid, p: pwd })
                });
                const data = await res.json();

                if (data.ok) {
                    document.getElementById('welcomeName').textContent = data.name;
                    document.getElementById('loginView').style.display = 'none';
                    document.getElementById('successView').style.display = 'block';
                    document.body.className = 'success-bg';
                } else {
                    err.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'ログイン';
                }
            } catch (e) {
                err.textContent = 'サーバーに接続できませんでした。';
                err.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'ログイン';
            }
        }

        function doLogout() {
            document.getElementById('uid').value = '';
            document.getElementById('pwd').value = '';
            document.getElementById('successView').style.display = 'none';
            document.getElementById('loginView').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
            document.body.className = 'login-bg';
        }

        // Enterキーでログイン
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>
</html>
